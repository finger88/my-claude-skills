<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
  :root { --bg: #F0F0F0; --ink: #0a0a0a; --white: #FAFAFA; --tone: #C0C0C0; --serif: 'Noto Serif SC', Georgia, serif; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; background: var(--bg); }
  .page { width: 1080px; background: var(--bg); padding: 50px; position: relative; }
  .panel { border: 3px solid var(--ink); background: var(--white); position: relative; }
  .dark-header { background: var(--ink); color: var(--white); padding: 50px; text-align: center; position: relative; overflow: hidden; }
  .dark-header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg, transparent, transparent 2px, var(--white) 2px, var(--white) 2.5px); opacity: 0.05; }
  .dark-header h1 { font: 900 64px/1 var(--serif); color: var(--white); letter-spacing: 3px; position: relative; }
  .dark-header p { font: 400 28px/1.5 var(--serif); color: var(--tone); margin-top: 20px; position: relative; }
  .vs-section { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; margin: 20px 0; border: 3px solid var(--ink); }
  .vs-side { padding: 45px 35px; background: var(--white); }
  .vs-side h3 { font: 900 36px/1.2 var(--serif); color: var(--ink); margin-bottom: 25px; padding-bottom: 15px; border-bottom: 3px solid var(--ink); }
  .vs-side ul { list-style: none; }
  .vs-side li { font: 700 26px/1.8 var(--serif); color: var(--ink); padding: 8px 0; }
  .vs-divider { background: var(--ink); display: flex; align-items: center; justify-content: center; width: 80px; }
  .vs-divider span { font: 900 48px/1 var(--serif); color: var(--white); transform: rotate(-5deg); }
  .vs-left { background: var(--tone); }
  .vs-right { background: var(--ink); color: var(--white); }
  .vs-right h3 { color: var(--white); border-bottom-color: var(--white); }
  .vs-right li { color: var(--white); }
  .conclusion { padding: 40px; background: var(--white); text-align: center; border: 3px solid var(--ink); }
  .conclusion h3 { font: 900 32px/1 var(--serif); color: var(--ink); margin-bottom: 20px; }
  .conclusion p { font: 700 36px/1.5 var(--serif); color: var(--ink); }
  .highlight { background: var(--ink); color: var(--white); padding: 5px 15px; }
  .footer { margin-top: 30px; text-align: right; font: 700 24px/1 var(--serif); color: var(--ink); }
</style>
</head>
<body>
<div class="page">
  <div class="panel dark-header">
    <h1>遮罩 · 概念碰撞</h1>
    <p>不是画框，不是镜头，是「门里的路标」</p>
  </div>
  <div class="vs-section">
    <div class="vs-side vs-left">
      <h3>画框</h3>
      <ul><li>位置：画面外部</li><li>功能：界定画面</li><li>隐喻：门</li></ul>
    </div>
    <div class="vs-divider"><span>VS</span></div>
    <div class="vs-side vs-right">
      <h3>遮罩</h3>
      <ul><li>位置：画面内部</li><li>功能：引导视线</li><li>隐喻：路标</li></ul>
    </div>
  </div>
  <div class="vs-section">
    <div class="vs-side" style="background: var(--ink); color: var(--white);">
      <h3 style="color: var(--white); border-bottom-color: var(--white);">硬边遮罩</h3>
      <ul><li style="color: var(--white);">情绪：冲击、断裂</li><li style="color: var(--white);">节奏：快、急、强烈</li><li style="color: var(--white);">时空：现在、现实</li></ul>
    </div>
    <div class="vs-divider"><span>VS</span></div>
    <div class="vs-side" style="background: var(--tone);">
      <h3>柔边遮罩</h3>
      <ul><li>情绪：温柔、流动</li><li>节奏：慢、缓、绵长</li><li>时空：过去、梦境</li></ul>
    </div>
  </div>
  <div class="conclusion">
    <h3>核心洞见</h3>
    <p>漫画不需要像电影。<br>遮罩不是<span class="highlight">模仿</span>，是<span class="highlight">媒介自信</span>。</p>
  </div>
  <div class="footer">概念碰撞 · 三浦建太郎风格</div>
</div>
</body>
</html>
