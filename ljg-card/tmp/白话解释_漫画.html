<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');

  :root {
    --bg: #FAFAFA;
    --ink: #1a1a1a;
    --ink-mid: #555;
    --white: #FAFAFA;
    --tone: #E0E0E0;
    --serif: 'Noto Serif SC', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; background: var(--bg); }

  .page {
    width: 1080px;
    background: var(--bg);
    padding: 40px;
    position: relative;
  }

  /* 松本大洋风格 - 生猛粗线 */
  .panel {
    border: 4px solid var(--ink);
    background: var(--white);
    position: relative;
  }

  .layout {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* 歪斜大格 */
  .slanted-panel {
    padding: 50px;
    transform: rotate(-1.5deg);
    margin: 10px 0;
  }

  .title-sfx {
    font: 900 72px/1 var(--serif);
    color: var(--ink);
    transform: rotate(-3deg) skewX(-2deg);
    letter-spacing: -2px;
    margin-bottom: 20px;
    text-shadow: 4px 4px 0 var(--tone);
  }

  .subtitle {
    font: 700 28px/1.4 var(--serif);
    color: var(--ink-mid);
    transform: rotate(0.5deg);
  }

  /* 核心类比格 */
  .core-panel {
    padding: 40px 50px;
    background: var(--ink);
    color: var(--white);
    position: relative;
    clip-path: polygon(0 0, 98% 2%, 100% 98%, 2% 100%);
  }

  .core-text {
    font: 900 42px/1.5 var(--serif);
    transform: rotate(0.8deg);
  }

  .highlight {
    background: var(--white);
    color: var(--ink);
    padding: 4px 12px;
    display: inline-block;
    transform: rotate(-2deg);
  }

  /* 不规则小格 */
  .split-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
  }

  .text-panel {
    padding: 30px;
    font: 400 28px/1.6 var(--serif);
    transform: rotate(0.5deg);
  }

  .icon-panel {
    padding: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--tone);
    transform: rotate(-1deg);
  }

  .icon-text {
    font: 900 120px/1 var(--serif);
    color: var(--ink);
    opacity: 0.15;
  }

  /* 效果字 */
  .effect-text {
    font: 900 48px/1.2 var(--serif);
    color: var(--ink);
    transform: rotate(-2deg);
    letter-spacing: 4px;
  }

  .colophon {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 10px 0;
    margin-top: 20px;
    border-top: 3px solid var(--ink);
    font: 400 22px/1 var(--serif);
    color: var(--ink-mid);
  }
</style>
</head>
<body>
<div class="page">
  <div class="layout">
    <!-- 歪斜标题格 -->
    <div class="panel slanted-panel">
      <div class="title-sfx">白话解释</div>
      <div class="subtitle">让12岁孩子也能懂的「手电筒比喻」</div>
    </div>

    <!-- 核心类比 -->
    <div class="panel core-panel">
      <div class="core-text">
        遮罩就是漫画家的<span class="highlight">「手电筒」</span>
      </div>
    </div>

    <!-- 对比格 -->
    <div class="split-grid">
      <div class="panel text-panel">
        没有遮罩的漫画，像<strong>全开灯的房间</strong>，你不知道该看哪。
        <br/><br/>
        有遮罩的漫画，像有人<strong>用手电筒引导你</strong>——一步一步带你走完整个故事。
      </div>
      <div class="panel icon-panel">
        <div class="icon-text">💡</div>
      </div>
    </div>

    <!-- 底部效果字 -->
    <div class="panel" style="padding: 30px; text-align: center;">
      <div class="effect-text">悄悄指着说：「看这里！」</div>
    </div>
  </div>

  <div class="colophon">
    <span>漫画的遮罩效果 · 求真</span>
    <span>松本大洋风格</span>
  </div>
</div>
</body>
</html>
