<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #FAF8F4;
    --text: #1D1D1F;
    --text-mid: #6E6E73;
    --text-dim: #ACACB0;
    --accent: #7C6853;
    --rule: #E5E5EA;
    --font: 'KingHwa_OldSong', 'PingFang SC', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; background: var(--bg); }
  .card {
    width: 1080px;
    background: var(--bg);
    padding: 64px 72px 52px;
    display: flex;
    flex-direction: column;
  }
  .title-area { flex-shrink: 0; margin-bottom: 52px; }
  .title-area h1 {
    font: 700 84px/1.15 var(--font);
    color: var(--text);
    letter-spacing: -0.03em;
    margin-bottom: 22px;
  }
  .title-area::after {
    content: '';
    display: block;
    width: 52px;
    height: 3px;
    background: var(--accent);
  }
  .content {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }
  .content h2 {
    font: 600 42px/1.4 var(--font);
    color: var(--text);
    margin: 44px 0 22px;
    letter-spacing: -0.02em;
  }
  .content h2:first-child { margin-top: 0; }
  .content .subtitle {
    font: 400 22px/2 var(--font);
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .network {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin: 40px 0;
    font: 400 32px/1.5 var(--font);
  }
  .node {
    padding: 16px 28px;
    background: white;
    border-radius: 8px;
    border: 2px solid var(--rule);
  }
  .node.active {
    border-color: var(--accent);
    background: var(--accent);
    color: white;
  }
  .arrow {
    color: var(--text-dim);
    font-size: 28px;
  }
  .content .highlight {
    font: 500 40px/1.55 var(--font);
    color: var(--text);
    padding: 14px 0 14px 26px;
    border-left: 3px solid var(--accent);
    margin: 36px 0;
  }
  .content::after {
    content: '∎';
    display: block;
    text-align: right;
    font-size: 16px;
    color: var(--accent);
    opacity: 0.4;
    margin-top: 40px;
  }
  .footer {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 52px;
    padding-top: 22px;
    border-top: 1px solid var(--rule);
  }
  .footer .author {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .footer .author-name {
    font: 400 24px/1.5 var(--font);
    color: var(--text-mid);
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="title-area">
      <h1>SaaS · 碰撞镜头</h1>
    </div>
    <div class="content">
      <p class="subtitle">CONCEPT NETWORK</p>
      <h2>概念网络</h2>

      <div class="network">
        <div class="node">本地软件</div>
        <span class="arrow">↔</span>
        <div class="node active">SaaS</div>
        <span class="arrow">↔</span>
        <div class="node">开源软件</div>
        <span class="arrow">↔</span>
        <div class="node" style="border-color: #e94560; color: #e94560;">龙虾(AI)</div>
      </div>

      <p class="highlight">核心张力：SaaS 追求「标准化」vs AI 追求「个性化」</p>
    </div>
    <div class="footer">
      <div class="author">
        <span class="author-name">李继刚</span>
      </div>
    </div>
  </div>
</body>
</html>
