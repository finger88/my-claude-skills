<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: {{BG_COLOR}};
    --text: {{TEXT_COLOR}};
    --text-mid: #A0A0A0;
    --text-dim: #666666;
    --accent: {{ACCENT_COLOR}};
    --border: #333333;
    --font: 'KingHwa_OldSong', 'PingFang SC', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    background: var(--bg);
  }

  .card {
    width: 1080px;
    background: var(--bg);
    padding: 64px 72px 52px;
    display: flex;
    flex-direction: column;
    border-top: 6px solid var(--accent);
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 48px;
  }

  .alert-icon {
    width: 48px;
    height: 48px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font: 700 28px/1 var(--font);
    color: var(--bg);
  }

  .title {
    font: 700 56px/1.2 var(--font);
    color: var(--text);
    letter-spacing: 0.05em;
  }

  /* ── Verdict (假设) ── */
  .verdict {
    border: 2px solid var(--accent);
    padding: 32px 36px;
    margin-bottom: 48px;
    position: relative;
  }

  .verdict::before {
    content: '假设';
    position: absolute;
    top: -14px;
    left: 24px;
    background: var(--bg);
    padding: 4px 16px;
    font: 600 18px/1 var(--font);
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .verdict-text {
    font: 600 36px/1.5 var(--font);
    color: var(--text);
    letter-spacing: 0.02em;
  }

  /* ── Section Divider ── */
  .section-title {
    font: 600 22px/1 var(--font);
    color: var(--accent);
    letter-spacing: 0.15em;
    margin: 48px 0 28px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Observation & Challenge Pairs ── */
  .pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
  }

  .pair:last-of-type {
    border-bottom: none;
  }

  .pair-label {
    font: 600 16px/1 var(--font);
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .observation p {
    font: 400 28px/1.6 var(--font);
    color: var(--text-mid);
  }

  .challenge p {
    font: 500 28px/1.6 var(--font);
    color: var(--text);
    position: relative;
    padding-left: 20px;
  }

  .challenge p::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
  }

  /* ── Dual (虚/实) ── */
  .dual {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 36px;
    margin: 36px 0;
    padding: 32px;
    border: 1px solid var(--border);
  }

  .dual h3 {
    font: 600 24px/1.3 var(--font);
    color: var(--accent);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .dual .keywords {
    font: 500 20px/1.5 var(--font);
    color: var(--text-mid);
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .dual .insight {
    font: 400 24px/1.65 var(--font);
    color: var(--text);
  }

  /* ── Questions ── */
  .questions {
    margin: 36px 0;
  }

  .questions h3 {
    font: 600 22px/1 var(--font);
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }

  .questions ol {
    list-style: none;
    counter-reset: q;
  }

  .questions li {
    font: 400 26px/1.7 var(--font);
    color: var(--text);
    margin-bottom: 20px;
    padding-left: 48px;
    position: relative;
  }

  .questions li::before {
    counter-increment: q;
    content: counter(q, decimal-leading-zero);
    position: absolute;
    left: 0;
    font: 600 20px/1 var(--font);
    color: var(--accent);
    opacity: 0.6;
  }

  /* ── Conclusion ── */
  .conclusion {
    margin-top: 48px;
    padding: 36px 40px;
    background: var(--accent);
    position: relative;
  }

  .conclusion::before {
    content: '归结';
    position: absolute;
    top: -14px;
    left: 24px;
    background: var(--bg);
    padding: 4px 16px;
    font: 600 18px/1 var(--font);
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .conclusion p {
    font: 600 32px/1.5 var(--font);
    color: var(--bg);
    letter-spacing: 0.02em;
  }

  /* ── Footer ── */
  .footer {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .footer .source {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .footer .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    filter: grayscale(100%);
  }

  .footer .source-name {
    font: 400 22px/1.5 var(--font);
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }

  .footer .badge {
    font: 600 16px/1 var(--font);
    color: var(--accent);
    letter-spacing: 0.1em;
    padding: 8px 16px;
    border: 1px solid var(--accent);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="alert-icon">!</div>
      <h1 class="title">{{TITLE}}</h1>
    </div>

    {{BODY_HTML}}

    <div class="footer">
      <div class="source">
        <img class="avatar" src="file:///Users/lijigang/.claude/skills/ljg-card/assets/logo.png" alt="">
        <span class="source-name">{{SOURCE}}</span>
      </div>
      <span class="badge">TRUTH</span>
    </div>
  </div>
</body>
</html>
